version: '3.8'

services:
  db:
    image: postgres:15
    container_name: payflow-postgres
    restart: always
    environment:
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payflow
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
